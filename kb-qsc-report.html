<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-BOB'S QSC Report</title>
<style>
:root{--bg:#f2f2f7;--card:#fff;--ink:#1c1c1e;--muted:#8e8e93;--muted2:#aeaeb2;--sep:#e5e5ea;--accent:#c8102e;--ok:#34c759;--attn:#ff9f0a;--rep:#ff3b30}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;overflow-x:hidden}
.wrap{max-width:620px;margin:0 auto;padding:0 16px 48px}
.top{position:relative;background:#fff;border-bottom:1px solid var(--sep);padding:14px 16px;text-align:center;font-size:12px;font-weight:800;letter-spacing:2px;color:var(--accent)}
.homelink{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--accent);font-weight:700;font-size:13px;letter-spacing:0;text-decoration:none}
.homebtn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:12px 30px;border-radius:22px;font-weight:700;font-size:15px}
.grade{border-radius:0 0 20px 20px;padding:26px 20px;text-align:center;color:#fff;margin-bottom:6px}
.grade.green{background:linear-gradient(160deg,#34c759,#248a3d)}
.grade.yellow{background:linear-gradient(160deg,#ffb340,#f08a00)}
.grade.red{background:linear-gradient(160deg,#ff5f57,#d70015)}
.grade .res{font-size:46px;font-weight:900;letter-spacing:-.02em;line-height:1}
.grade .lab{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.95;margin-top:6px}
.grade .badge{display:inline-block;margin-top:14px;background:rgba(255,255,255,.22);padding:6px 15px;border-radius:20px;font-size:13px;font-weight:700}
.meta{background:var(--card);border-radius:14px;padding:14px 16px;margin:14px 0;font-size:14px}
.meta .r{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:5px 0;border-bottom:1px solid var(--sep);flex-wrap:wrap}
.meta .r:last-child{border-bottom:none}
.meta .r .k{color:var(--muted);flex:0 0 auto}
.meta .r .v{font-weight:600;text-align:right;min-width:0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(74px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--card);border-radius:12px;padding:12px 6px;text-align:center}
.stat .n{font-size:22px;font-weight:800}
.stat .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.stat.fail .n{color:var(--rep)}.stat.warn .n{color:var(--attn)}.stat.cap .n{color:#8a6d1f}
.h{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin:20px 4px 8px}
.group{background:var(--card);border-radius:14px;overflow:hidden}
.sl{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--sep);font-size:15px}
.sl:last-child{border-bottom:none}
.sl .v{font-weight:700;font-size:14px}
.sl .v.pass{color:#248a3d}.sl .v.fail{color:var(--rep)}
.sl .v small{color:var(--muted2);font-weight:500}
.item{padding:14px 16px;border-bottom:1px solid var(--sep)}
.item:last-child{border-bottom:none}
.item .head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:6px}
.tag.attn{background:#fff2df;color:#a25e00}.tag.rep{background:#ffeceb;color:#c9291f}.tag.cap{background:#efe7d3;color:#8a6d1f}
.tag.due{background:#eef2f7;color:#4a5a6a}
.item .where{font-weight:700;font-size:15px}
.item .note{font-size:14px;color:#3a3a3c;margin:2px 0 10px}
.thumbs{display:flex;gap:8px;flex-wrap:wrap}
.thumbs img{width:78px;height:78px;object-fit:cover;border-radius:9px;cursor:pointer}
.capbox{background:#fff9ef;border:1px solid #f0dcae}
.prio{background:var(--card);border-radius:14px;padding:6px 16px}
.prio div{padding:9px 0;border-bottom:1px solid var(--sep);font-size:15px;display:flex;gap:10px}
.prio div:last-child{border-bottom:none}
.prio .n{color:var(--accent);font-weight:800}
.foot{text-align:center;font-size:12px;color:var(--muted2);margin-top:22px;line-height:1.6}
.empty{padding:60px 24px;text-align:center;color:var(--muted)}
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:16px;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.secblock{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid var(--sep)}
.secblock summary{padding:13px 16px;font-weight:700;font-size:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;list-style:none}
.secblock summary::-webkit-details-marker{display:none}
.secblock summary>span:first-child{flex:1;min-width:0}
.secblock summary::after{content:"";width:8px;height:8px;border-right:2px solid #b0b3b8;border-bottom:2px solid #b0b3b8;transform:rotate(45deg);transition:transform .2s ease;flex:0 0 auto;margin:0 3px 3px 6px}
.secblock[open] summary::after{transform:rotate(-135deg);margin:3px 3px 0 6px}
.secblock summary:active{background:#f7f7fa}
.secblock[open] summary{border-bottom:1px solid var(--sep)}
.secblock .sl{padding:10px 16px}
.subhd{font-size:11px;font-weight:800;color:#8e8e93;text-transform:uppercase;letter-spacing:.04em;padding:12px 16px 4px}
.actbar{display:flex;gap:10px;margin:16px 0 4px}
.actbtn{flex:1;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:700;padding:13px;border-radius:12px;cursor:pointer}
.actbtn.ghost{background:#fff;color:var(--accent);border:1px solid #e7c3c8}
.actbtn:active{opacity:.7}
@media print{
  .top,.actbar,.lightbox,.foot,.homebtn{display:none!important}
  a[href^="kb-qsc-form"],button{display:none!important}
  body{background:#fff}
  .wrap{max-width:100%;padding:0}
  .secblock{border:1px solid #ccc}
  .item,.secblock,.stat{page-break-inside:avoid}
  details>summary{list-style:none}
}
</style>
</head>
<body>
<div class="top"><a href="index.html" class="homelink">&lsaquo; Home</a>K-BOB'S QSC REPORT</div>
<div id="app"><div class="empty">Loading report…</div></div>
<div class="lightbox" id="lb" onclick="closeLb()"><img id="lbImg" src="" alt=""></div>
<script>
const id=new URLSearchParams(location.search).get('id');
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function openLb(u){document.getElementById('lbImg').src=u;document.getElementById('lb').classList.add('show');}
function closeLb(){document.getElementById('lb').classList.remove('show');document.getElementById('lbImg').src='';}
function thumbs(arr){ if(!arr||!arr.length) return ''; return '<div class="thumbs">'+arr.map(u=>`<img src="${esc(u)}" onclick="openLb('${esc(u)}')">`).join('')+'</div>'; }
function fmt(iso,o){ if(!iso) return '—'; try{return new Date(iso).toLocaleString(undefined,o);}catch(e){return '—';} }
if(!id){ document.getElementById('app').innerHTML='<div class="empty">No report selected.</div>'; }
else { fetch('/api/report?id='+encodeURIComponent(id)).then(r=>{ if(!r.ok) throw 0; return r.json(); }).then(render).catch(()=>{ document.getElementById('app').innerHTML='<div class="empty">Report not found.<br>It may still be saving — try again in a moment.</div>'; }); }
function execSummary(rec,spot){
  const who=rec.submittedBy||'A manager', store=rec.store||'the store';
  const kind=spot?'spot check':(rec.type||'review');
  const scope=(spot&&rec.spotTitles&&rec.spotTitles.length)?(' of '+rec.spotTitles.join(', ')):'';
  const dateStr=fmt(rec.submittedAt,{month:'long',day:'numeric',year:'numeric'})||rec.date||'';
  const res=rec.result||'PASS', colorWord={green:'Green',yellow:'Yellow',red:'Red'}[rec.color]||'';
  const c=rec.counts||{}, rep=c.rep||0, attn=c.attn||0, cap=c.capital||0, failed=rec.sectionsFailed||0;
  const p=[];
  p.push(esc(who)+' completed a '+esc(kind)+esc(scope)+' at '+esc(store)+(dateStr?' on '+esc(dateStr):'')+'.');
  p.push('Result: '+esc(res)+(colorWord?' ('+colorWord+')':'')+'.');
  const iss=[];
  if(rep) iss.push(rep+' repair'+(rep>1?'s':''));
  if(attn) iss.push(attn+' attention item'+(attn>1?'s':''));
  if(cap) iss.push(cap+' corporate/capital item'+(cap>1?'s':''));
  p.push(iss.length?('Flagged: '+iss.join(', ')+'.'):'No issues flagged \u2014 all checked items met standard.');
  if(failed) p.push(failed+' section'+(failed>1?'s':'')+' failed.');
  if(rec.incomplete&&rec.incompleteSections&&rec.incompleteSections.length) p.push(rec.incompleteSections.length+' section(s) left incomplete and not graded.');
  return p.join(' ');
}
function aiBlock(v){
  let h='<div style="margin-bottom:8px"><span style="font-size:11px;color:#8e8e93;font-weight:800;letter-spacing:.04em">CLAUDE REVIEW</span></div>';
  h+='<div style="font-size:14.5px;line-height:1.55">'+esc(v.summary||'')+'</div>';
  return h;
}
function showAllPunch(){ document.querySelectorAll(".punch-extra").forEach(function(e){e.style.display="";}); var b=document.getElementById("punchBtn"); if(b) b.style.display="none"; }
function shareReport(){
  var t=document.title||"K-BOB'S QSC Report", url=location.href;
  if(navigator.share){ navigator.share({title:t, text:t, url:url}).catch(function(){}); }
  else { location.href='mailto:?subject='+encodeURIComponent(t)+'&body='+encodeURIComponent(t+'\n\nView the full report: '+url); }
}
function savePdf(){
  document.querySelectorAll('details').forEach(function(d){d.open=true;});
  setTimeout(function(){ window.print(); }, 200);
}
function delReport(){
  if(!confirm('Delete this report permanently? This cannot be undone.')) return;
  fetch('/api/delete?id='+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(){ location.href='index.html'; }).catch(function(){ alert('Delete failed \u2014 try again.'); });
}
function doOverride(){
  const sel=document.getElementById('ovBy'), by=sel?sel.value:'';
  if(!by){ alert('Choose who is releasing the hold.'); return; }
  fetch('/api/override?id='+encodeURIComponent(id)+'&by='+encodeURIComponent(by)).then(function(r){return r.json();}).then(function(){ location.reload(); }).catch(function(){ alert('Override failed \u2014 try again.'); });
}
function reviewWithClaude(rec){
  const card=document.getElementById('execCard'); if(!card) return;
  if(rec.aiSummary){ card.innerHTML=aiBlock({summary:rec.aiSummary}); return; }
  fetch('/api/review?id='+encodeURIComponent(id)).then(r=>r.json()).then(v=>{
    if(v&&v.summary){ card.innerHTML=aiBlock(v); }
    else { const hh=document.getElementById('aihint'); if(hh) hh.textContent = v&&v.error ? ('Claude review unavailable: '+v.error) : ''; }
  }).catch(e=>{ const hh=document.getElementById('aihint'); if(hh) hh.textContent='Claude review unavailable (network).'; });
}
function render(rec){
  const color=rec.color||'green', res=rec.result||'PASS', c=rec.counts||{};
  try{document.title="K-BOB'S QSC "+(rec.store||'')+' '+(rec.date||'');}catch(e){}
  const spot=(rec.mode==='spot'||rec.type==='Spot Check');
  const verified=!!rec.verified, selfResult=rec.selfResult||'', downgrades=rec.aiDowngrades||[], mismatch=rec.aiMismatch||[], notDone=rec.incompleteSections||[], incomplete=(res==='INCOMPLETE')||(notDone.length>0);
  const colLabel={green:'Green · Standard Met',yellow:'Yellow · Action Required',red:'Red · Follow-up Required'}[color]||'';
  const items=rec.items||[];
  const flagged=items.filter(x=>(x.mark==='attn'||x.mark==='rep')&&!x.capital);
  const caps=items.filter(x=>x.capital&&(x.mark==='attn'||x.mark==='rep'));
  const attnAll=items.filter(x=>x.mark==='attn'&&!x.capital).length, repAll=items.filter(x=>x.mark==='rep'&&!x.capital).length, capAll=caps.length;
  const areaTotal=Object.values(rec.areaPhotos||{}).reduce((a,arr)=>a+((arr&&arr.length)||0),0);
  const itemTotal=items.reduce((a,x)=>a+((x.photos&&x.photos.length)||0),0);
  const dur=(rec.startedAt&&rec.submittedAt)?Math.max(1,Math.round((new Date(rec.submittedAt)-new Date(rec.startedAt))/60000)):null;
  const markTag=m=>m==='rep'?'<span class="tag rep">REPAIR</span>':'<span class="tag attn">ATTENTION</span>';
  let h='';
  if(incomplete){
    h+=`<div class="grade" style="background:linear-gradient(160deg,#8a8f98,#5b6068)"><div class="res" style="font-size:30px">INCOMPLETE</div><div class="lab">Photos didn't match — nothing graded</div></div>`;
  } else {
    const vtag = verified?' · Verified by Claude ✓':'';
    h+=`<div class="grade ${color}"><div class="res">${res}</div><div class="lab">${spot?'Spot Check Result':'Overall Result'}</div><div class="badge">${colLabel}${vtag}</div></div>`;
  }
  h+='<div class="wrap">';
  h+='<div class="actbar"><button class="actbtn" onclick="shareReport()">&#128233; Email / Share</button><button class="actbtn ghost" onclick="savePdf()">&#128196; Save as PDF</button></div>';
  h+='<div class="h">Executive summary</div><div class="group"><div class="item"><div class="note" id="execCard" style="margin:0;font-size:14.5px;line-height:1.55">'+execSummary(rec,spot)+'<div id="aihint" style="margin-top:9px;font-size:12px;color:#8e8e93;font-weight:600">\u2728 Asking Claude to review the photos\u2026</div></div></div></div>';
  if(verified && selfResult && selfResult!==res && !incomplete){
    h+='<div class="h">Grade adjusted by Claude</div><div class="group" style="padding:14px 16px"><div style="font-size:15px">Self-reported <b>'+esc(selfResult)+'</b> \u2192 Claude-verified <b>'+esc(res)+'</b></div></div>';
  }
  if(downgrades.length){
    h+='<div class="h">Items Claude downgraded from the photos</div><div class="group">'+downgrades.map(function(d){return '<div class="item"><div class="head">'+(d.mark==='rep'?'<span class="tag rep">REPAIR</span>':'<span class="tag attn">ATTENTION</span>')+'</div><div class="where">'+esc(d.sectionTitle||'')+' \u2014 '+esc(d.item||'')+'</div>'+(d.reason?'<div class="note">'+esc(d.reason)+'</div>':'')+'</div>';}).join('')+'</div>';
  }
  if(notDone.length){
    h+='<div class="h">Not finished \u2014 these sections weren\'t graded</div><div class="group" style="padding:14px 16px"><div style="font-size:14px;margin-bottom:10px">'+esc(notDone.join(', '))+' \u2014 finish '+(notDone.length>1?'these sections':'this section')+' (add the missing photos/marks) and resubmit.</div><a class="homebtn" style="display:block;text-align:center" href="kb-qsc-form.html?edit='+encodeURIComponent(rec.id)+'">Finish &amp; resubmit</a></div>';
  }
    h+='<div class="meta">'
    +`<div class="r"><span class="k">Store</span><span class="v">${esc(rec.store)}</span></div>`
    +`<div class="r"><span class="k">Type</span><span class="v">${esc(rec.type)}</span></div>`
    +(spot&&rec.spotTitles&&rec.spotTitles.length?`<div class="r"><span class="k">Sections checked</span><span class="v">${esc(rec.spotTitles.join(', '))}</span></div>`:'')
    +(rec.incomplete&&rec.incompleteSections&&rec.incompleteSections.length?`<div class="r"><span class="k">Not graded (incomplete)</span><span class="v">${esc(rec.incompleteSections.join(', '))}</span></div>`:'')
    +`<div class="r"><span class="k">Submitted by</span><span class="v">${esc(rec.submittedBy)}</span></div>`
    +`<div class="r"><span class="k">Date</span><span class="v">${esc(rec.date)}</span></div>`
    +`<div class="r"><span class="k">Submitted</span><span class="v">${fmt(rec.submittedAt,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}${dur?` (${dur} min)`:''}</span></div>`
    +`<div class="r"><span class="k">GM / Reviewer</span><span class="v">${esc(rec.gm||'—')} / ${esc(rec.reviewer||'—')}</span></div>`
    +'</div>';
  h+='<div class="stats">'
    +`<div class="stat fail"><div class="n">${rec.sectionsFailed||0}</div><div class="l">Sections failed</div></div>`
    +`<div class="stat warn"><div class="n">${repAll}</div><div class="l">Repairs</div></div>`
    +`<div class="stat"><div class="n">${attnAll}</div><div class="l">Attention</div></div>`
    +`<div class="stat cap"><div class="n">${capAll}</div><div class="l">Capital</div></div>`
    +'</div>';
  const bySec={}; items.forEach(it=>{(bySec[it.section]=bySec[it.section]||[]).push(it);});
  const scoreBySec={}; (rec.scores||[]).forEach(x=>{scoreBySec[x.section]=x;});
  const markBadge=m=>m==='ok'?'<span class="tag" style="background:#e7f9ec;color:#248a3d">OK</span>':m==='attn'?'<span class="tag attn">ATTN</span>':m==='rep'?'<span class="tag rep">REPAIR</span>':m==='na'?'<span class="tag" style="background:#eef2f7;color:#4a5a6a">N/A</span>':'';
  const titleFor=sn=>{ const m=(rec.scores||[]).find(x=>String(x.section)===String(sn)); if(m) return m.title; const idx=(rec.spotSections||[]).indexOf(Number(sn)); return idx>=0?(rec.spotTitles||[])[idx]:('Section '+sn); };
  let dSecs=rec.spotSections||[], dTitles=rec.spotTitles||[];
  if(!dSecs.length && (rec.scores||[]).length){ dSecs=(rec.scores).map(x=>x.section); dTitles=(rec.scores).map(x=>x.title); }
  if(dSecs.length){
    h+='<div class="h">Section scores &amp; detail</div>';
    dSecs.forEach((sn,i)=>{
      const title=dTitles[i]||('Section '+sn), sc=scoreBySec[sn], secItems=bySec[sn]||[];
      const badge = sc ? '<span class="v '+(sc.pass?'pass':'fail')+'">'+(sc.na?'N/A':(sc.pass?'Pass':'Fail')+' '+sc.ok+'/'+sc.applicable)+'</span>' : '<span class="v" style="color:#8a8f98">Incomplete</span>';
      h+='<details class="secblock"><summary><span>'+esc(title)+'</span>'+badge+'</summary>';
      h+= secItems.length ? secItems.map(it=>'<div class="sl"><span>'+esc(it.item)+'</span><span>'+markBadge(it.mark)+'</span></div>'+(it.note?'<div class="note" style="padding:0 16px 10px;margin:0">'+esc(it.note)+'</div>':'')).join('') : '<div class="sl" style="color:#8a8f98">Not started.</div>';
      const areaArr=(rec.areaPhotos&&rec.areaPhotos[sn])||[];
      if(areaArr.length) h+='<div style="padding:12px 16px 14px"><div style="font-size:11px;color:#8e8e93;font-weight:700;margin-bottom:6px">Proof photos</div>'+thumbs(areaArr)+'</div>';
      h+='</details>';
    });
  }
  if(flagged.length){
    const pbySec={}; flagged.slice().sort((a,b)=>(a.section-b.section)).forEach(x=>{(pbySec[x.section]=pbySec[x.section]||[]).push(x);});
    h+='<div class="h">Store punch-list · needs correction</div>';
    Object.keys(pbySec).forEach(sn=>{
      const arr=pbySec[sn];
      h+='<details class="secblock"><summary><span>'+esc(titleFor(sn))+'</span><span class="v fail">'+arr.length+' to fix</span></summary>';
      h+=arr.map(x=>'<div class="item"><div class="head">'+markTag(x.mark)+(x.fixBy?'<span class="tag due">Fix by '+esc(x.fixBy)+'</span>':'')+'</div><div class="where">'+esc(x.item)+'</div>'+(x.note?'<div class="note">'+esc(x.note)+'</div>':'')+thumbs(x.photos)+'</div>').join('');
      h+='</details>';
    });
  }
  if(caps.length){
    h+='<div class="h">Capital — corporate action · not charged to store</div><div class="group capbox">';
    caps.forEach(x=>{ h+=`<div class="item"><div class="head"><span class="tag cap">CORPORATE</span>${x.fixBy?`<span class="tag due">Target ${esc(x.fixBy)}</span>`:''}</div>`
      +`<div class="where">${x.section}. ${esc(x.item)}</div>`
      +(x.note?`<div class="note">${esc(x.note)}</div>`:'')
      +thumbs(x.photos)+'</div>'; });
    h+='</div>';
  }
  const prio=(rec.priorities||[]).filter(Boolean);
  if(prio.length){ h+='<div class="h">Top 3 priorities</div><div class="prio">'+prio.map((p,i)=>`<div><span class="n">${i+1}.</span><span>${esc(p)}</span></div>`).join('')+'</div>'; }
  if(rec.supportNeeded){ h+='<div class="h">Support needed from corporate</div><div class="group"><div class="item"><div class="note" style="margin:0">'+esc(rec.supportNeeded)+'</div></div></div>'; }
  // (per-section proof photos now live inside the Section-by-section detail)
  h+='<div style="text-align:center;margin-top:24px"><a href="index.html" class="homebtn">Back to Home</a></div>';
  h+='<div style="text-align:center;margin-top:12px"><a href="kb-qsc-form.html?edit='+encodeURIComponent(rec.id)+'" style="color:#007aff;font-size:14px;font-weight:700;text-decoration:none">Edit / redo this audit</a></div>';
  h+='<div style="text-align:center;margin-top:12px"><button onclick="delReport()" style="background:none;border:none;color:#c9291f;font-size:13px;font-weight:700;cursor:pointer">Delete this report</button></div>';
  h+='<div class="foot">K-BOB&#39;S Steakhouse &middot; Quality, Sanitation &amp; Cleanliness<br>Generated from the QSC audit record.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  reviewWithClaude(rec);
}
</script>
</body>
</html>
